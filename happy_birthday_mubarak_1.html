<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Uppa! 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #FF6B9D 0%, #FF9F40 25%, #FFD93D 50%, #6BCB77 75%, #4D96FF 100%);
    background-size: 400% 400%;
    animation: gradientShift 6s ease infinite;
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  canvas#confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    gap: 20px;
  }

  .card {
    background: rgba(255,255,255,0.93);
    border-radius: 32px;
    padding: 48px 48px 40px;
    max-width: 540px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    animation: bounceIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes bounceIn {
    0% { opacity: 0; transform: scale(0.5) translateY(60px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .emoji-row {
    font-size: 48px;
    margin-bottom: 16px;
    animation: wiggle 1.5s ease-in-out infinite;
    display: block;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-5deg) scale(1); }
    50% { transform: rotate(5deg) scale(1.1); }
  }

  .title {
    font-family: 'Pacifico', cursive;
    font-size: 40px;
    background: linear-gradient(135deg, #FF6B9D, #FF9F40, #FFD93D, #4D96FF);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 3s ease infinite;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .name {
    font-family: 'Pacifico', cursive;
    font-size: 56px;
    background: linear-gradient(135deg, #FF6B9D, #FF9F40);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  .message {
    font-size: 18px;
    color: #555;
    line-height: 1.7;
    font-weight: 700;
    margin-bottom: 28px;
  }

  .cake-container {
    margin: 24px 0;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }

  .cake-svg {
    width: 160px;
    height: 160px;
  }

  .wishes-box {
    background: linear-gradient(135deg, #FF6B9D22, #4D96FF22);
    border: 2px dashed #FF6B9D;
    border-radius: 20px;
    padding: 20px 24px;
    margin-top: 8px;
  }

  .wish-item {
    font-size: 15px;
    color: #444;
    font-weight: 700;
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .wish-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    animation: pop 1s ease-in-out infinite;
  }

  @keyframes pop {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.5); }
  }

  .balloons {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 28px 0 0;
    flex-wrap: wrap;
  }

  .balloon {
    width: 54px;
    height: 68px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: relative;
    animation: floatBalloon 3s ease-in-out infinite;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .balloon:hover { transform: scale(1.2) rotate(10deg); }

  .balloon::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 1.5px;
    height: 20px;
    background: #888;
  }

  .b1 { background: radial-gradient(circle at 35% 35%, #FF9999, #FF4444); animation-delay: 0s; }
  .b2 { background: radial-gradient(circle at 35% 35%, #FFD999, #FF9F40); animation-delay: 0.4s; }
  .b3 { background: radial-gradient(circle at 35% 35%, #99DDFF, #4D96FF); animation-delay: 0.8s; }
  .b4 { background: radial-gradient(circle at 35% 35%, #AAFFAA, #6BCB77); animation-delay: 1.2s; }
  .b5 { background: radial-gradient(circle at 35% 35%, #FFB3DD, #FF6B9D); animation-delay: 0.2s; }

  @keyframes floatBalloon {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-14px) rotate(3deg); }
  }

  .footer-text {
    margin-top: 28px;
    font-family: 'Pacifico', cursive;
    font-size: 18px;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    animation: fadeInUp 1s 1s both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stars {
    position: fixed;
    width: 100%; height: 100%;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    animation: starFloat linear infinite;
    opacity: 0.8;
  }

  @keyframes starFloat {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 500px) {
    .card { padding: 32px 24px 28px; }
    .title { font-size: 30px; }
    .name { font-size: 42px; }
  }

  .music-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 10;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: none;
    background: white;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: musicPop 0.6s 1.5s cubic-bezier(0.34,1.56,0.64,1) both;
    transition: transform 0.2s;
  }
  .music-btn:hover { transform: scale(1.12); }
  .music-btn.playing { animation: spin 4s linear infinite; }

  @keyframes musicPop {
    from { opacity: 0; transform: scale(0); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .music-label {
    position: fixed;
    bottom: 94px;
    right: 22px;
    z-index: 10;
    background: white;
    border-radius: 16px;
    padding: 6px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #FF6B9D;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    animation: musicPop 0.6s 2s cubic-bezier(0.34,1.56,0.64,1) both;
    white-space: nowrap;
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div class="stars" id="stars"></div>

<div class="content">
  <div class="card">
    <span class="emoji-row">🎉🎂🎈</span>
    <div class="title">Happy Birthday</div>
    <div class="name">Mubarak!</div>

    <div class="cake-container">
      <svg class="cake-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="60" cy="38" rx="5" ry="9" fill="#FFD93D" opacity="0.9">
          <animate attributeName="ry" values="9;11;9" dur="0.7s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="80" cy="32" rx="5" ry="10" fill="#FF9F40" opacity="0.95">
          <animate attributeName="ry" values="10;13;10" dur="0.6s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="100" cy="38" rx="5" ry="9" fill="#FF6B9D" opacity="0.9">
          <animate attributeName="ry" values="9;11;9" dur="0.8s" repeatCount="indefinite"/>
        </ellipse>
        <rect x="56" y="47" width="8" height="20" rx="3" fill="#FFD93D"/>
        <rect x="76" y="42" width="8" height="22" rx="3" fill="#FF9F40"/>
        <rect x="96" y="47" width="8" height="20" rx="3" fill="#FF6B9D"/>
        <rect x="40" y="67" width="80" height="25" rx="8" fill="#FF9F40"/>
        <rect x="40" y="87" width="80" height="5" rx="2" fill="#FFD93D" opacity="0.7"/>
        <rect x="30" y="92" width="100" height="28" rx="8" fill="#FF6B9D"/>
        <rect x="30" y="114" width="100" height="6" rx="2" fill="#FF9F40" opacity="0.6"/>
        <rect x="20" y="120" width="120" height="30" rx="8" fill="#4D96FF"/>
        <circle cx="50" cy="80" r="4" fill="white" opacity="0.8"/>
        <circle cx="68" cy="80" r="4" fill="white" opacity="0.8"/>
        <circle cx="86" cy="80" r="4" fill="white" opacity="0.8"/>
        <circle cx="104" cy="80" r="4" fill="white" opacity="0.8"/>
        <circle cx="42" cy="106" r="4" fill="#FFD93D" opacity="0.9"/>
        <circle cx="58" cy="106" r="4" fill="#FFD93D" opacity="0.9"/>
        <circle cx="80" cy="106" r="4" fill="#FFD93D" opacity="0.9"/>
        <circle cx="102" cy="106" r="4" fill="#FFD93D" opacity="0.9"/>
        <circle cx="118" cy="106" r="4" fill="#FFD93D" opacity="0.9"/>
        <circle cx="35" cy="134" r="5" fill="white" opacity="0.6"/>
        <circle cx="58" cy="134" r="5" fill="white" opacity="0.6"/>
        <circle cx="80" cy="134" r="5" fill="white" opacity="0.6"/>
        <circle cx="103" cy="134" r="5" fill="white" opacity="0.6"/>
        <circle cx="126" cy="134" r="5" fill="white" opacity="0.6"/>
        <ellipse cx="80" cy="150" rx="70" ry="8" fill="#E0E0E0" opacity="0.7"/>
      </svg>
    </div>

    <p class="message">
      Today is your special day, Uppa! 🌟<br>
      You are loved more than words can say.
    </p>

    <div class="wishes-box">
      <div class="wish-item"><div class="wish-dot" style="background:#FF6B9D;"></div> Endless happiness & laughter</div>
      <div class="wish-item"><div class="wish-dot" style="background:#FF9F40;"></div> Perfect health & strength always</div>
      <div class="wish-item"><div class="wish-dot" style="background:#6BCB77;"></div> Blessings in everything you do</div>
      <div class="wish-item"><div class="wish-dot" style="background:#4D96FF;"></div> A year full of beautiful moments</div>
    </div>

    <div class="balloons">
      <div class="balloon b1"></div>
      <div class="balloon b2"></div>
      <div class="balloon b3"></div>
      <div class="balloon b4"></div>
      <div class="balloon b5"></div>
    </div>
  </div>

  <div class="footer-text">Made with ❤️ just for you, Uppa! 🎊</div>
</div>

<div class="music-label" id="musicLabel">🎵 Tap to play music!</div>
<button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Play/Pause Music">🎵</button>

<script>
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const colors = ['#FF6B9D','#FF9F40','#FFD93D','#6BCB77','#4D96FF','#FF4444','#B44FFF'];
  const pieces = [];
  for (let i = 0; i < 130; i++) {
    pieces.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight - window.innerHeight,
      w: Math.random() * 12 + 6,
      h: Math.random() * 7 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: Math.random() * 3 + 1.5,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 6,
      drift: (Math.random() - 0.5) * 1.5
    });
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.y += p.speed;
      p.x += p.drift;
      p.angle += p.spin;
      if (p.y > window.innerHeight + 20) {
        p.y = -20;
        p.x = Math.random() * window.innerWidth;
      }
    });
    requestAnimationFrame(drawConfetti);
  }
  drawConfetti();

  const starsEl = document.getElementById('stars');
  const emojis = ['⭐','🌟','✨','💫','🌸','🌺','🎊','🎁'];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (Math.random() * 8 + 6) + 's';
    s.style.animationDelay = (Math.random() * 8) + 's';
    s.style.fontSize = (Math.random() * 16 + 14) + 'px';
    starsEl.appendChild(s);
  }
</script>

<script>
  let audioCtx = null;
  let isPlaying = false;
  let stopFlag = false;
  const btn = document.getElementById('musicBtn');
  const label = document.getElementById('musicLabel');

  // Happy Birthday melody: [frequency in Hz, duration in seconds]
  const melody = [
    [264, 0.3],[264, 0.15],[297, 0.45],[264, 0.45],[352, 0.45],[330, 0.9],
    [264, 0.3],[264, 0.15],[297, 0.45],[264, 0.45],[396, 0.45],[352, 0.9],
    [264, 0.3],[264, 0.15],[528, 0.45],[440, 0.45],[352, 0.45],[330, 0.45],[297, 0.45],
    [470, 0.3],[470, 0.15],[440, 0.45],[352, 0.45],[396, 0.45],[352, 0.9],
  ];

  function playNote(ctx, freq, startTime, duration) {
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, startTime);
    gainNode.gain.setValueAtTime(0, startTime);
    gainNode.gain.linearRampToValueAtTime(0.35, startTime + 0.02);
    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration - 0.02);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

  async function playMelody() {
    stopFlag = false;
    while (!stopFlag) {
      if (!audioCtx || audioCtx.state === 'closed') {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      let time = audioCtx.currentTime + 0.1;
      for (let i = 0; i < melody.length; i++) {
        if (stopFlag) break;
        playNote(audioCtx, melody[i][0], time, melody[i][1]);
        time += melody[i][1] + 0.05;
      }
      const totalDuration = melody.reduce((s, n) => s + n[1] + 0.05, 0) * 1000 + 200;
      await new Promise(r => setTimeout(r, totalDuration));
    }
  }

  function toggleMusic() {
    if (!isPlaying) {
      isPlaying = true;
      stopFlag = false;
      btn.textContent = '🎶';
      btn.classList.add('playing');
      label.textContent = '🎶 Playing music...';
      playMelody();
    } else {
      isPlaying = false;
      stopFlag = true;
      if (audioCtx) audioCtx.close().then(() => audioCtx = null);
      btn.textContent = '🎵';
      btn.classList.remove('playing');
      label.textContent = '🎵 Tap to play music!';
    }
  }

  // Hide label after 5 seconds
  setTimeout(() => { label.style.opacity = '0'; label.style.transition = 'opacity 1s'; }, 5000);
</script>
</body>
</html>
